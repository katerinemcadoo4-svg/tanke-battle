<!DOCTYPE html>
<html>
<head><title>Canvas Test</title></head>
<body style="background:#333;display:flex;justify-content:center;align-items:center;min-height:100vh">
<canvas id="cv" width="640" height="640" style="border:3px solid red"></canvas>
<script>
var cv = document.getElementById('cv');
var cx = cv.getContext('2d');

// Test 1: fill background
cx.fillStyle = '#c8c8a0';
cx.fillRect(0, 0, 640, 640);

// Test 2: draw a red square at top-left
cx.fillStyle = 'red';
cx.fillRect(10, 10, 100, 100);

// Test 3: draw a green square at center
cx.fillStyle = 'green';
cx.fillRect(270, 270, 100, 100);

// Test 4: draw text
cx.fillStyle = 'black';
cx.font = '30px monospace';
cx.fillText('Canvas works!', 200, 200);

alert('Canvas test: width=' + cv.width + ' height=' + cv.height);
</script>
</body>
</html>
